name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

# Pages デプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # テスト（CI）ジョブ
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint
  
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Secret Management Demo
        run: echo "秘密の値を使用します： ${{ secrets.MY_SUPER_SECRET }}"

      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t test-image .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-image'
          format: 'table'
          exit-code: '1' # 脆弱性が見つかったらパイプラインを失敗させる
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # デプロイ（CD）ジョブ
  deploy:
    needs: [test,security] # テストとセキュリティチェックが成功した時のみ実行される
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # ルートディレクトリを公開対象にする

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
